name: Build Android APK (No Firebase)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Add this step to create the missing .env files
      - name: Create placeholder env files
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            # Create a minimal .env file with dummy values
            cat > .env.example << 'EOF'
          API_KEY=dummy_key
          # Add any other required environment variables here
          EOF
            cp .env.example .env
          fi

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make Wrapper Executable
        run: chmod +x gradlew

      - name: Disable Firebase
        run: |
          sed -i '/com.google.gms.google-services/d' app/build.gradle.kts
          sed -i '/com.google.firebase/d' app/build.gradle.kts
          sed -i '/google-services/d' build.gradle.kts || true
          sed -i '/firebase/d' build.gradle.kts || true

      - name: Remove Custom Debug Signing
        run: |
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
